name: Build and Publish Firmware Release

on:
  push:
    tags:
      - "espeed_fw_v*"
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and publish (example: espeed_fw_v5.0 or v5.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ -z "$tag" ]]; then
            echo "Release tag is empty." >&2
            exit 1
          fi

          # Normalize tag to a plain vX.Y version string for use in filenames.
          # Strips legacy "espeed_fw_" prefix, then ensures a leading "v".
          ver="${tag#espeed_fw_}"
          ver="${ver#v}"
          ver="v${ver}"

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "ver=$ver" >> "$GITHUB_OUTPUT"

      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.tag }}
          fetch-depth: 0

      - name: Setup arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 core and libraries
        shell: bash
        run: |
          arduino-cli config init --overwrite
          arduino-cli core update-index
          arduino-cli core install esp32:esp32
          arduino-cli lib update-index
          arduino-cli lib install "OneBitDisplay" "Ai Esp32 Rotary Encoder"

      - name: Build firmware
        shell: bash
        run: |
          BOARD="esp32:esp32:esp32"
          BOARD_OPTIONS="JTAGAdapter=default,PSRAM=disabled,PartitionScheme=default,CPUFreq=240,FlashMode=qio,FlashFreq=80,FlashSize=4M,UploadSpeed=115200,LoopCore=1,EventsCore=1,DebugLevel=none,EraseFlash=none,ZigbeeMode=default"

          arduino-cli compile \
            --fqbn "$BOARD" \
            --board-options "$BOARD_OPTIONS" \
            --build-path build \
            source/ESPEED32

      - name: Build SPIFFS image
        shell: bash
        run: |
          PARTITIONS_FILE="build/partitions.csv"
          DATA_DIR="source/ESPEED32/data"
          SPIFFS_IMAGE="build/espeed32_spiffs.bin"

          if [[ ! -f "$PARTITIONS_FILE" ]]; then
            echo "Missing partitions file: $PARTITIONS_FILE" >&2
            exit 1
          fi

          mkspiffs_dir="$(ls -d "$HOME/.arduino15/packages/esp32/tools/mkspiffs/"* 2>/dev/null | sort -V | tail -n 1 || true)"
          mkspiffs_bin="$mkspiffs_dir/mkspiffs"
          if [[ ! -x "$mkspiffs_bin" ]]; then
            echo "mkspiffs not found in ESP32 core toolchain." >&2
            exit 1
          fi

          spiffs_size="$(awk -F',' '$1 ~ /^[[:space:]]*spiffs[[:space:]]*$/ {gsub(/[[:space:]]/,"",$5); print $5}' "$PARTITIONS_FILE")"
          if [[ -z "$spiffs_size" ]]; then
            echo "Could not resolve SPIFFS size from $PARTITIONS_FILE" >&2
            exit 1
          fi

          "$mkspiffs_bin" -c "$DATA_DIR" -b 4096 -p 256 -s "$spiffs_size" "$SPIFFS_IMAGE"

      - name: Prepare release files
        id: files
        shell: bash
        run: |
          OUT_DIR="${RUNNER_TEMP}/release"
          mkdir -p "$OUT_DIR"

          VER="${{ steps.meta.outputs.ver }}"
          TAG="${{ steps.meta.outputs.tag }}"

          # Firmware filename encodes version and mag sensor family (tle493d = default trigger sensor).
          # SPIFFS is hardware-independent so carries only the version.
          FW_NAME="espeed32-fw-${VER}-tle493d.bin"
          SPIFFS_NAME="espeed32-spiffs-${VER}.bin"

          cp build/ESPEED32.ino.bin "$OUT_DIR/${FW_NAME}"
          cp build/espeed32_spiffs.bin "$OUT_DIR/${SPIFFS_NAME}"

          # Compute stable GitHub asset download URLs so the download service can
          # serve canonical paths (/firmware.bin, /releases/{v}/firmware.bin)
          # regardless of how the underlying asset is named. This is what makes
          # OTA updates backwards- and forwards-compatible across renames.
          REPO="nerdweeg/ESPEED32"
          FW_URL="https://github.com/${REPO}/releases/download/${TAG}/${FW_NAME}"
          SPIFFS_URL="https://github.com/${REPO}/releases/download/${TAG}/${SPIFFS_NAME}"

          echo "out_dir=$OUT_DIR" >> "$GITHUB_OUTPUT"
          echo "fw_name=${FW_NAME}" >> "$GITHUB_OUTPUT"
          echo "spiffs_name=${SPIFFS_NAME}" >> "$GITHUB_OUTPUT"
          echo "fw_url=${FW_URL}" >> "$GITHUB_OUTPUT"
          echo "spiffs_url=${SPIFFS_URL}" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: espeed32-release-${{ steps.meta.outputs.tag }}
          path: ${{ steps.files.outputs.out_dir }}

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ESPEED32 ${{ steps.meta.outputs.ver }}
          generate_release_notes: true
          files: |
            ${{ steps.files.outputs.out_dir }}/*
          fail_on_unmatched_files: true

      - name: Update releases.json in download service
        shell: bash
        env:
          DOWNLOADS_DEPLOY_TOKEN: ${{ secrets.DOWNLOADS_DEPLOY_TOKEN }}
        run: |
          VER="${{ steps.meta.outputs.ver }}"
          TAG="${{ steps.meta.outputs.tag }}"
          FW_URL="${{ steps.files.outputs.fw_url }}"
          SPIFFS_URL="${{ steps.files.outputs.spiffs_url }}"
          PUBLISHED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # Clone the download service repo, inject the new release entry, and push.
          # The worker serves releases.json as-is, so explicit firmwareUrl/spiffsUrl
          # here is what keeps OTA working for all UI versions regardless of filename changes.
          git clone "https://x-access-token:${DOWNLOADS_DEPLOY_TOKEN}@github.com/nerdweeg/espeed32-downloads.git" downloads-repo
          cd downloads-repo

          node - <<'JS'
          const fs = require('fs');
          const path = 'releases.json';
          const raw = fs.existsSync(path) ? fs.readFileSync(path, 'utf8') : '{"releases":[]}';
          const data = JSON.parse(raw);
          if (!Array.isArray(data.releases)) data.releases = [];

          const ver  = process.env.VER.replace(/^v/, '');
          const tag  = process.env.TAG;
          const entry = {
            version:     ver,
            tag:         tag,
            name:        'ESPEED32 ' + tag,
            publishedAt: process.env.PUBLISHED_AT,
            source:      'https://github.com/nerdweeg/ESPEED32/releases/tag/' + encodeURIComponent(tag),
            firmwareUrl: process.env.FW_URL,
            spiffsUrl:   process.env.SPIFFS_URL,
          };

          // Replace existing entry for this version or prepend as newest.
          const idx = data.releases.findIndex(r => String(r.version).replace(/^v/,'') === ver);
          if (idx >= 0) data.releases[idx] = entry;
          else data.releases.unshift(entry);

          data.latestVersion = data.releases[0].version;
          fs.writeFileSync(path, JSON.stringify(data, null, 2) + '\n');
          console.log('Updated releases.json for', ver);
          JS

          git config user.email "ci@espeed32.com"
          git config user.name "ESPEED32 CI"
          git add releases.json
          git commit -m "release: add ${VER} to releases.json"
          git push
