<svg xmlns="http://www.w3.org/2000/svg" width="1450" height="500" viewBox="0 0 1450 500" role="img" aria-labelledby="title desc">
  <title id="title">WiFi OLED examples</title>
  <desc id="desc">Illustration of the controller OLED WiFi info page and the full-screen QR join screen.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #fbfbfb; stroke: #d2d2d2; stroke-width: 2; rx: 18; ry: 18; }
      .frame { fill: #202020; stroke: #5a5a5a; stroke-width: 8; rx: 32; ry: 32; }
      .screen-light { fill: #f5f5f5; stroke: #666666; stroke-width: 2; rx: 14; ry: 14; }
      .title { fill: #222222; font-family: Arial, Helvetica, sans-serif; font-size: 34px; font-weight: 700; text-anchor: middle; }
      .note { fill: #5b5b5b; font-family: Arial, Helvetica, sans-serif; font-size: 20px; text-anchor: middle; }
      .oled-title { fill: #111111; font-family: "Courier New", Courier, monospace; font-size: 24px; font-weight: 700; text-anchor: middle; }
      .oled { fill: #111111; font-family: "Courier New", Courier, monospace; font-size: 18px; }
      .qr-white { fill: #f5f5f5; }
      .qr-black { fill: #111111; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1450" height="500"/>

  <g transform="translate(35,30)">
    <rect class="panel" x="0" y="0" width="670" height="420"/>
    <text class="title" x="335" y="48">INFO PAGE</text>
    <text class="note" x="335" y="78">AP mode OLED with SSID, password, and browser IP</text>

    <g transform="translate(115,104)">
      <rect class="frame" x="0" y="0" width="440" height="300"/>
      <rect class="screen-light" x="34" y="56" width="372" height="188"/>

      <text class="oled-title" x="220" y="84">WiFi info</text>
      <text class="oled" x="56" y="118">SSID: ESPEED32_A1B2</text>
      <text class="oled" x="56" y="146">Pass: espeed32</text>
      <text class="oled" x="56" y="174">Open in browser:</text>
      <text class="oled" x="56" y="202">192.168.4.1</text>
    </g>
  </g>

  <g transform="translate(745,30)">
    <rect class="panel" x="0" y="0" width="670" height="420"/>
    <text class="title" x="335" y="48">SHOW QR</text>
