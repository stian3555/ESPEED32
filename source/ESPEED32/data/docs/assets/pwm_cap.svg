<svg xmlns="http://www.w3.org/2000/svg" width="1550" height="430" viewBox="0 0 1550 430" role="img" aria-labelledby="title desc">
  <title id="title">PWM frequency capped-duty examples</title>
  <desc id="desc">Examples comparing 1 kilohertz and 5 kilohertz in a LIMIT 70 full-trigger case capped to 70 percent duty. The dashed line marks the average or effective level for the shown duty.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #fcfcfc; stroke: #d2d2d2; stroke-width: 2; rx: 18; ry: 18; }
      .axis { stroke: #171717; stroke-width: 4; }
      .grid { stroke: #dfdfdf; stroke-width: 2; stroke-dasharray: 6 8; }
      .label { fill: #171717; font-family: Arial, Helvetica, sans-serif; font-size: 27px; }
      .title { fill: #171717; font-family: Arial, Helvetica, sans-serif; font-size: 35px; font-weight: 700; }
      .note { fill: #555555; font-family: Arial, Helvetica, sans-serif; font-size: 21px; }
      .pulse-label { fill: #171717; font-family: Arial, Helvetica, sans-serif; font-size: 20px; }
      .legend-label { fill: #555555; font-family: Arial, Helvetica, sans-serif; font-size: 18px; }
      .wave { fill: none; stroke: #111111; stroke-width: 7; stroke-linecap: square; stroke-linejoin: miter; }
      .accent { fill: none; stroke: #d94f04; stroke-width: 7; stroke-linecap: round; stroke-linejoin: round; }
      .duty { stroke: #767676; stroke-width: 3; stroke-dasharray: 10 8; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1550" height="430"/>

  <g transform="translate(35,25)">
    <rect class="panel" x="0" y="0" width="715" height="360"/>
    <text class="title" x="36" y="48">1 kHz, LIMIT 70</text>
    <text class="note" x="36" y="78">Full trigger, capped to 70% duty</text>
    <line class="duty" x1="430" y1="102" x2="500" y2="102"/>
    <text class="legend-label" x="510" y="108">avg / effective level</text>

    <line class="grid" x1="110" y1="295" x2="655" y2="295"/>
    <line class="grid" x1="110" y1="156" x2="655" y2="156"/>
    <line class="axis" x1="110" y1="310" x2="110" y2="90"/>
    <line class="axis" x1="110" y1="310" x2="655" y2="310"/>
    <line class="duty" x1="110" y1="156" x2="655" y2="156"/>

    <text class="label" x="42" y="118">100%</text>
    <text class="label" x="58" y="164">70%</text>
    <text class="label" x="80" y="318">0</text>
    <text class="label" x="360" y="350">Time</text>
    <text class="label" x="24" y="220" transform="rotate(-90 24 220)">Voltage</text>

    <path class="wave" d="M110 310 L130 310 L130 120 L235 120 L235 310 L280 310 L280 120 L385 120 L385 310 L430 310 L430 120 L535 120 L535 310 L580 310 L580 120 L655 120"/>

    <path class="accent" d="M130 105 L235 105"/>
    <path class="accent" d="M235 105 L280 105"/>
    <text class="pulse-label" x="145" y="98">ON</text>
    <text class="pulse-label" x="244" y="98">OFF</text>
  </g>

  <g transform="translate(800,25)">
    <rect class="panel" x="0" y="0" width="715" height="360"/>
    <text class="title" x="36" y="48">5 kHz, LIMIT 70</text>
    <text class="note" x="36" y="78">Full trigger, capped to 70% duty</text>
    <line class="duty" x1="430" y1="102" x2="500" y2="102"/>
    <text class="legend-label" x="510" y="108">avg / effective level</text>

    <line class="grid" x1="110" y1="295" x2="655" y2="295"/>
    <line class="grid" x1="110" y1="156" x2="655" y2="156"/>
    <line class="axis" x1="110" y1="310" x2="110" y2="90"/>
    <line class="axis" x1="110" y1="310" x2="655" y2="310"/>
    <line class="duty" x1="110" y1="156" x2="655" y2="156"/>

    <text class="label" x="42" y="118">100%</text>
    <text class="label" x="58" y="164">70%</text>
    <text class="label" x="80" y="318">0</text>
    <text class="label" x="360" y="350">Time</text>
    <text class="label" x="24" y="220" transform="rotate(-90 24 220)">Voltage</text>

    <path class="wave" d="M110 310 L122 310 L122 120 L151 120 L151 310 L163 310 L163 120 L192 120 L192 310 L204 310 L204 120 L233 120 L233 310 L245 310 L245 120 L274 120 L274 310 L286 310 L286 120 L315 120 L315 310 L327 310 L327 120 L356 120 L356 310 L368 310 L368 120 L397 120 L397 310 L409 310 L409 120 L438 120 L438 310 L450 310 L450 120 L479 120 L479 310 L491 310 L491 120 L520 120 L520 310 L532 310 L532 120 L561 120 L561 310 L573 310 L573 120 L602 120 L602 310 L614 310 L614 120 L643 120 L643 310 L655 310"/>

    <path class="accent" d="M122 105 L151 105"/>
    <path class="accent" d="M151 105 L163 105"/>
    <text class="pulse-label" x="124" y="98">ON</text>
    <text class="pulse-label" x="151" y="98">OFF</text>
  </g>
</svg>
