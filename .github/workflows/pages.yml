name: Publish Docs and Hosted UI

on:
  push:
    branches:
      - main
    paths:
      - "source/ESPEED32/data/docs/**"
      - "source/ESPEED32/data/ui/**"
      - ".github/CNAME"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build Pages site artifact
        run: |
          rm -rf site
          mkdir -p site/docs site/ui

          cp source/ESPEED32/data/favicon.svg site/favicon.svg

          # Publish docs at /docs/
          cp -R source/ESPEED32/data/docs/. site/docs/
          # Keep /docs/ valid on GitHub Pages (docs folder has no own index by default)
          cat > site/docs/index.html << 'EOF'
          <!doctype html>
          <html>
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0;url=./en/">
            <title>ESPEED32 Docs</title>
            <link rel="icon" href="../favicon.svg" type="image/svg+xml">
          </head>
          <body>
            <p>Redirecting to <a href="./en/">documentation</a>...</p>
          </body>
          </html>
          EOF

          # Publish hosted UI at /ui/ and make it the landing page (/)
          cp -R source/ESPEED32/data/ui/. site/ui/
          cp source/ESPEED32/data/ui/index.html site/index.html

          SITE_URL=""

          # Optional custom domain: keep the CNAME source under .github/.
          if [ -f .github/CNAME ]; then
            SITE_HOST="$(tr -d '[:space:]' < .github/CNAME)"
            if [ -n "$SITE_HOST" ]; then
              SITE_URL="https://$SITE_HOST"
            fi
            cp .github/CNAME site/CNAME
          fi

          if [ -z "$SITE_URL" ]; then
            REPO_NAME="${GITHUB_REPOSITORY#*/}"
            SITE_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}"
          fi

          TODAY="$(date -u +%F)"

          cat > site/robots.txt << EOF
          User-agent: *
          Allow: /

          Sitemap: ${SITE_URL}/sitemap.xml
          EOF

          cat > site/sitemap.xml << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
            <url>
              <loc>${SITE_URL}/</loc>
              <lastmod>${TODAY}</lastmod>
            </url>
            <url>
              <loc>${SITE_URL}/docs/en/</loc>
              <lastmod>${TODAY}</lastmod>
            </url>
            <url>
              <loc>${SITE_URL}/docs/no/</loc>
              <lastmod>${TODAY}</lastmod>
            </url>
            <url>
              <loc>${SITE_URL}/docs/es/</loc>
              <lastmod>${TODAY}</lastmod>
            </url>
            <url>
              <loc>${SITE_URL}/docs/de/</loc>
              <lastmod>${TODAY}</lastmod>
            </url>
          </urlset>
          EOF

          touch site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
