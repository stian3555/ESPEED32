<svg xmlns="http://www.w3.org/2000/svg" width="1550" height="360" viewBox="0 0 1550 360" role="img" aria-labelledby="title desc">
  <title id="title">Curve examples</title>
  <desc id="desc">Three throttle curve examples: linear, soft, and hard.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .axis { stroke: #111111; stroke-width: 4; }
      .curve { fill: none; stroke: #111111; stroke-width: 7; stroke-linecap: round; stroke-linejoin: round; }
      .label { fill: #111111; font-family: Arial, Helvetica, sans-serif; font-size: 28px; }
      .title { fill: #111111; font-family: Arial, Helvetica, sans-serif; font-size: 34px; font-weight: 700; }
      .value { fill: #111111; font-family: Arial, Helvetica, sans-serif; font-size: 64px; font-weight: 700; }
      .note { fill: #444444; font-family: Arial, Helvetica, sans-serif; font-size: 22px; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1550" height="360"/>

  <g transform="translate(25,12)">
    <text class="label" x="0" y="20">100%</text>
    <text class="label" x="0" y="210">MIN</text>
    <text class="label" x="62" y="258">0%</text>
    <text class="label" x="255" y="258">50%</text>
    <text class="label" x="430" y="258">100%</text>
    <text class="label" x="420" y="122">0%</text>
    <text class="value" x="335" y="168">50%</text>
    <line class="axis" x1="54" y1="10" x2="54" y2="226"/>
    <line class="axis" x1="54" y1="226" x2="465" y2="226"/>
    <path class="curve" d="M54 205 L465 10"/>
    <text class="title" x="160" y="306">Linear Curve</text>
    <text class="note" x="124" y="338">Balanced middle response</text>
  </g>

  <g transform="translate(555,12)">
    <text class="label" x="0" y="20">100%</text>
    <text class="label" x="0" y="210">MIN</text>
    <text class="label" x="62" y="258">0%</text>
    <text class="label" x="255" y="258">50%</text>
    <text class="label" x="430" y="258">100%</text>
    <text class="label" x="420" y="122">0%</text>
    <text class="value" x="332" y="168">17%</text>
    <line class="axis" x1="54" y1="10" x2="54" y2="226"/>
    <line class="axis" x1="54" y1="226" x2="465" y2="226"/>
    <path class="curve" d="M54 205 L260 175 L465 10"/>
    <text class="title" x="186" y="306">Soft Curve</text>
    <text class="note" x="114" y="338">Gentler first half, stronger finish</text>
  </g>

  <g transform="translate(1085,12)">
    <text class="label" x="0" y="20">100%</text>
    <text class="label" x="0" y="210">MIN</text>
    <text class="label" x="62" y="258">0%</text>
    <text class="label" x="255" y="258">50%</text>
    <text class="label" x="430" y="258">100%</text>
    <text class="label" x="420" y="122">0%</text>
    <text class="value" x="312" y="168">85%</text>
    <line class="axis" x1="54" y1="10" x2="54" y2="226"/>
    <line class="axis" x1="54" y1="226" x2="465" y2="226"/>
    <path class="curve" d="M54 205 L260 40 L465 10"/>
    <text class="title" x="184" y="306">Hard Curve</text>
    <text class="note" x="116" y="338">Aggressive first half, calmer finish</text>
  </g>
</svg>
