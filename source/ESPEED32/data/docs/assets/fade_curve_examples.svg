<svg xmlns="http://www.w3.org/2000/svg" width="1550" height="430" viewBox="0 0 1550 430" role="img" aria-labelledby="title desc">
  <title id="title">Fade plus curve examples</title>
  <desc id="desc">Two examples showing fade combined with linear and hard curve shapes.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #fcfcfc; stroke: #cfcfcf; stroke-width: 2; rx: 18; ry: 18; }
      .axis { stroke: #222222; stroke-width: 4; }
      .grid { stroke: #dddddd; stroke-width: 2; stroke-dasharray: 6 8; }
      .label { fill: #222222; font-family: Arial, Helvetica, sans-serif; font-size: 28px; }
      .title { fill: #222222; font-family: Arial, Helvetica, sans-serif; font-size: 34px; font-weight: 700; }
      .note { fill: #555555; font-family: Arial, Helvetica, sans-serif; font-size: 22px; }
      .curve { fill: none; stroke: #111111; stroke-width: 9; stroke-linecap: round; stroke-linejoin: round; }
      .fade { fill: none; stroke: #d94f04; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; }
      .sensi { stroke: #666666; stroke-width: 3; stroke-dasharray: 10 8; }
      .tick { fill: #222222; }
      .accent { fill: #d94f04; stroke: #d94f04; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1550" height="430"/>

  <g transform="translate(35,25)">
    <rect class="panel" x="0" y="0" width="715" height="380"/>
    <text class="title" x="36" y="48">FADE + LINEAR</text>
    <text class="note" x="36" y="78">Soft launch, then linear response</text>
    <line class="grid" x1="120" y1="275" x2="650" y2="275"/>
    <line class="grid" x1="120" y1="145" x2="650" y2="145"/>
    <line class="axis" x1="120" y1="320" x2="120" y2="95"/>
    <line class="axis" x1="120" y1="320" x2="650" y2="320"/>
    <line class="sensi" x1="120" y1="230" x2="650" y2="230"/>
    <text class="label" x="52" y="104">100%</text>
    <text class="label" x="58" y="239">SENSI</text>
    <text class="label" x="86" y="328">0</text>
    <text class="label" x="348" y="360">Trigger</text>
    <text class="label" x="25" y="208" transform="rotate(-90 25 208)">Output</text>
    <text class="label" x="610" y="360">100%</text>
    <text class="label" x="166" y="352">FADE</text>
    <path class="fade" d="M120 320 L220 230"/>
    <path class="curve" d="M220 230 L650 110"/>
    <circle class="accent" cx="220" cy="230" r="7"/>
  </g>

  <g transform="translate(800,25)">
    <rect class="panel" x="0" y="0" width="715" height="380"/>
    <text class="title" x="36" y="48">FADE + HARD CURVE</text>
    <text class="note" x="36" y="78">Gentle launch, then more aggressive early punch</text>
    <line class="grid" x1="120" y1="275" x2="650" y2="275"/>
    <line class="grid" x1="120" y1="145" x2="650" y2="145"/>
    <line class="axis" x1="120" y1="320" x2="120" y2="95"/>
    <line class="axis" x1="120" y1="320" x2="650" y2="320"/>
    <line class="sensi" x1="120" y1="230" x2="650" y2="230"/>
    <text class="label" x="52" y="104">100%</text>
    <text class="label" x="58" y="239">SENSI</text>
    <text class="label" x="86" y="328">0</text>
    <text class="label" x="348" y="360">Trigger</text>
    <text class="label" x="25" y="208" transform="rotate(-90 25 208)">Output</text>
    <text class="label" x="610" y="360">100%</text>
    <text class="label" x="166" y="352">FADE</text>
    <path class="fade" d="M120 320 L220 230"/>
    <path class="curve" d="M220 230 L390 125 L650 110"/>
    <circle class="accent" cx="220" cy="230" r="7"/>
  </g>
</svg>
