<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ESPEED32</title>
<style>
body{font-family:Arial,sans-serif;max-width:480px;margin:20px auto;padding:0 15px;background:#1a1a2e;color:#eee}
h1{color:#e94560;text-align:center;margin-bottom:5px}
p.sub{text-align:center;color:#888;margin-top:0}
h2{color:#ccc;font-size:16px;margin-bottom:5px}
.btn{display:block;width:100%;padding:15px;margin:10px 0;border:none;border-radius:8px;font-size:16px;cursor:pointer;box-sizing:border-box;text-decoration:none;text-align:center}
.dl{background:#0f3460;color:#fff}.dl:hover{background:#1a4a80}
.ul{background:#e94560;color:#fff}.ul:hover{background:#ff6b81}
.ota{background:#ff8c00;color:#000}.ota:hover{background:#ffa500}
.usb{background:#16c79a;color:#000}.usb:hover{background:#20e0ab}
.doc{background:#2f8f2f;color:#fff}.doc:hover{background:#3aa83a}
hr{border-color:#333;margin:20px 0}
input[type=file]{display:block;margin:10px 0;color:#eee;width:100%}
.st{margin:15px 0;padding:12px;border-radius:5px;display:none;text-align:center}
.ok{background:#16c79a;color:#000}.err{background:#e94560;color:#fff}
.warn{color:#ff8c00;font-size:13px;text-align:center}
#usbbar{display:none;margin-bottom:10px}
</style>
</head>
<body>
<h1>ESPEED32</h1>
<p class="sub">v<span id="ver">-</span> &middot; <span id="devid">----</span></p>
<div id="usbbar"><button id="ucb" class="btn usb" onclick="usbToggle()">Connect via USB (WebSerial)</button></div>
<h2>Config Backup &amp; Restore (.json)</h2>
<button class="btn dl" onclick="doBackup()">Download Config Backup</button>
<form id="uf">
<input type="file" id="fi" accept=".json">
<button type="submit" class="btn ul">Restore Config</button>
</form>
<div id="st" class="st"></div>
<hr>
<h2>User Guide</h2>
<a id="docs-link" class="btn doc" href="/docs" target="_blank" rel="noopener">Open User Guide (NO / EN / ES / DE)</a>
<p class="warn">Docs and UI are served from the controller file system (SPIFFS).</p>
<hr>
<h2>Firmware Update (.bin)</h2>
<div id="otadiv">
<form id="of">
<input type="file" id="fw" accept=".bin">
<button type="submit" class="btn ota">Upload Firmware</button>
</form>
<p class="warn">Do not disconnect power during update.</p>
</div>
<p id="otausb" style="display:none" class="warn">Firmware update requires WiFi mode.</p>
<div id="ost" class="st"></div>
<script>
var port=null,usb=false,_b='',_r=null,_pump=null;
var E=new TextEncoder(),D=new TextDecoder();
var info={deviceId:'----',version:'-',docsPath:'/docs'};

function ss(id,c,m){var e=document.getElementById(id);e.className='st '+c;e.textContent=m;e.style.display='block';}

function applyInfo(){
  document.getElementById('devid').textContent=info.deviceId||'----';
  document.getElementById('ver').textContent=info.version||'-';
  document.getElementById('docs-link').href=info.docsPath||'/docs';
}

async function loadInfo(){
  try{
    var r=await fetch('/api/info',{cache:'no-store'});
    if(r.ok){
      var j=await r.json();
      if(j.deviceId)info.deviceId=j.deviceId;
      if(j.version)info.version=j.version;
      if(j.docsPath)info.docsPath=j.docsPath;
    }
  }catch(_){ }
  applyInfo();
}

async function pump(){while(usb){try{var o=await _r.read();if(o.done)break;_b+=D.decode(o.value);}catch(_){break;}}}

async function rl(ms){
  ms=ms||5000;
  var t=Date.now()+ms;
  while(_b.indexOf('\n')<0){if(Date.now()>t)throw new Error('Device not responding');await new Promise(function(r){setTimeout(r,50);});}
  var i=_b.indexOf('\n');
  var r=_b.slice(0,i).replace(/\r$/,'');
  _b=_b.slice(i+1);
  return r;
}

async function rb(n,ms){
  ms=ms||15000;
  var t=Date.now()+ms;
  while(_b.length<n){if(Date.now()>t)throw new Error('Device not responding');await new Promise(function(r){setTimeout(r,50);});}
  var r=_b.slice(0,n);
  _b=_b.slice(n);
  return r;
}

async function ws(s){
  var w=port.writable.getWriter();
  try{await w.write(E.encode(s));}
  finally{w.releaseLock();}
}

async function usbToggle(){
  if(!usb){
    try{
      port=await navigator.serial.requestPort();
      await port.open({baudRate:115200});
      _b='';
      _r=port.readable.getReader();
      usb=true;
      _pump=pump();
      var b=document.getElementById('ucb');
      b.textContent='Disconnect USB';
      b.className='btn ul';
      document.getElementById('otadiv').style.display='none';
      document.getElementById('otausb').style.display='block';
      try{
        await ws('VERSION\n');
        var vr=await rl(3000);
        var vp=vr.split(',');
        if(vp.length===2){
          info.deviceId=vp[0]||info.deviceId;
          info.version=(vp[1]||'').replace('v','')||info.version;
          applyInfo();
        }
      }catch(_){ }
    }catch(e){ss('st','err','USB: '+e.message);}
  }else{
    usb=false;
    if(_r){try{await _r.cancel();}catch(_){}}
    _r=null;
    if(_pump){try{await _pump;}catch(_){}}
    _pump=null;
    _b='';
    try{await port.close();}catch(_){ }
    port=null;
    var b2=document.getElementById('ucb');
    b2.textContent='Connect via USB (WebSerial)';
    b2.className='btn usb';
    document.getElementById('otadiv').style.display='block';
    document.getElementById('otausb').style.display='none';
  }
}

async function doBackup(){
  var d=new Date().toISOString().slice(0,10);
  var fn=d+'-espeed32_v'+info.version+'_'+info.deviceId+'_backup.json';
  if(!usb){
    var a=document.createElement('a');
    a.href='/backup';
    a.download=fn;
    a.click();
    return;
  }
  ss('st','','Reading backup...');
  try{
    _b='';
    await ws('BACKUP\n');
    var j=await rb(parseInt(await rl(),10));
    var a2=document.createElement('a');
    a2.href=URL.createObjectURL(new Blob([j],{type:'application/json'}));
    a2.download=fn;
    a2.click();
    ss('st','ok','Backup downloaded');
  }catch(e){ss('st','err',e.message+' - re-enter USB mode on device');}
}

document.getElementById('uf').onsubmit=async function(e){
  e.preventDefault();
  var f=document.getElementById('fi').files[0];
  if(!f){alert('Select a JSON file');return;}
  if(!f.name.toLowerCase().endsWith('.json')){alert('Only .json files allowed');return;}
  ss('st','','Uploading...');
  if(!usb){
    var fd=new FormData();
    fd.append('file',f);
    try{var r=await fetch('/restore',{method:'POST',body:fd});var t=await r.text();ss('st',t.indexOf('OK')===0?'ok':'err',t);}catch(x){ss('st','err',''+x);}    
    return;
  }
  try{
    var j=await f.text(),b=E.encode(j);
    _b='';
    await ws('RESTORE\n'+b.length+'\n');
    var w=port.writable.getWriter();
    try{await w.write(b);}finally{w.releaseLock();}
    var resp=await rl(20000);
    ss('st',resp.indexOf('OK')===0?'ok':'err',resp);
  }catch(x){ss('st','err',x.message+' - re-enter USB mode on device');}
};

document.getElementById('of').onsubmit=async function(e){
  e.preventDefault();
  var f=document.getElementById('fw').files[0];
  if(!f){alert('Select a .bin file');return;}
  if(!f.name.toLowerCase().endsWith('.bin')){alert('Only .bin files allowed');return;}
  ss('ost','','Uploading firmware...');
  var fd=new FormData();
  fd.append('file',f);
  try{var r=await fetch('/ota',{method:'POST',body:fd});var t=await r.text();ss('ost',t.indexOf('OK')===0?'ok':'err',t);}catch(x){ss('ost','err',''+x);}
};

if('serial' in navigator){document.getElementById('usbbar').style.display='block';}
loadInfo();
</script>
</body>
</html>
