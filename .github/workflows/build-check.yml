name: Firmware Compile Check

on:
  push:
    branches:
      - main
      - "v*"
  pull_request:
    branches:
      - main

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache arduino-cli packages
        uses: actions/cache@v4
        with:
          path: ~/.arduino15
          key: arduino-esp32-3.3.7-obd-3.0.0-enc-1.7.0
          restore-keys: arduino-esp32-

      - name: Setup arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 core and libraries
        shell: bash
        run: |
          arduino-cli config init --overwrite
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@3.3.7
          arduino-cli lib update-index
          arduino-cli lib install "OneBitDisplay@3.0.0" "Ai Esp32 Rotary Encoder@1.7.0"

      - name: Lint with arduino-lint
        uses: arduino/arduino-lint-action@v1
        with:
          path: source/ESPEED32
          compliance: permissive
          project-type: sketch

      - name: Compile firmware
        shell: bash
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32 \
            --board-options "JTAGAdapter=default,PSRAM=disabled,PartitionScheme=default,CPUFreq=240,FlashMode=qio,FlashFreq=80,FlashSize=4M,UploadSpeed=115200,LoopCore=1,EventsCore=1,DebugLevel=none,EraseFlash=none,ZigbeeMode=default" \
            --build-path /tmp/build-check \
            source/ESPEED32
