name: Publish Docs and Hosted UI

on:
  push:
    branches:
      - main
    paths:
      - "source/ESPEED32/data/docs/**"
      - "source/ESPEED32/data/ui/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build Pages site artifact
        run: |
          rm -rf site
          mkdir -p site/docs site/ui

          # Publish docs at /docs/
          cp -R source/ESPEED32/data/docs/. site/docs/
          # Keep /docs/ valid on GitHub Pages (docs folder has no own index by default)
          cat > site/docs/index.html << 'EOF'
          <!doctype html>
          <html>
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0;url=./en/">
            <title>ESPEED32 Docs</title>
          </head>
          <body>
            <p>Redirecting to <a href="./en/">documentation</a>...</p>
          </body>
          </html>
          EOF

          # Publish hosted UI at /ui/ and make it the landing page (/)
          cp -R source/ESPEED32/data/ui/. site/ui/
          cp source/ESPEED32/data/ui/index.html site/index.html

          # Optional custom domain: commit a CNAME file in repository root.
          if [ -f CNAME ]; then
            cp CNAME site/CNAME
          fi

          touch site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
